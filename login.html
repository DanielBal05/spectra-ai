<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spectra AI — Login</title>

<style>
:root{
  --bg0:#020617;
  --bg1:#000;
  --card: rgba(11, 18, 36, .62);
  --stroke: rgba(64, 116, 255, .16);
  --stroke2: rgba(34, 211, 238, .22);
  --text:#e5e7eb;
  --muted:#9ca3af;

  --cyan:#22d3ee;
  --purple:#a855f7;
  --pink:#ec4899;

  --danger:#f97373;

  --shadow: 0 20px 70px rgba(0,0,0,.55);
  --radius: 22px;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }

/* =========================
   ✅ BODY + FONDO TECH WAVE
   ========================= */
body{
  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
  color: var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;

  /* Base Spectra-style (lo tuyo) */
  background:
    radial-gradient(1200px 600px at 15% 10%, rgba(34,211,238,.18), transparent 55%),
    radial-gradient(900px 500px at 85% 18%, rgba(168,85,247,.16), transparent 60%),
    radial-gradient(700px 500px at 50% 85%, rgba(236,72,153,.10), transparent 60%),
    radial-gradient(circle at top, #0b1120 0, #020617 45%, #000 100%);
}

/* ✅ 1) Nebula / Onda azul tipo “tech array” (animada) */
body::before{
  content:"";
  position:absolute;
  inset:-18%;
  background:
    radial-gradient(circle at 30% 40%, rgba(0,140,255,.38), transparent 42%),
    radial-gradient(circle at 75% 30%, rgba(0,110,255,.26), transparent 46%),
    radial-gradient(circle at 55% 75%, rgba(0,80,200,.18), transparent 58%),
    radial-gradient(circle at 45% 55%, rgba(34,211,238,.10), transparent 60%);
  filter: blur(70px);
  opacity: .95;
  animation: floatWave 12s ease-in-out infinite alternate;
  z-index:-2;
  pointer-events:none;
}

/* ✅ 2) Grid holográfico + partículas (se combina con tu estilo) */
body::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    /* Grid */
    linear-gradient(to right, rgba(0,170,255,.085) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,170,255,.055) 1px, transparent 1px),

    /* Partículas */
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.22), transparent 55%),
    radial-gradient(2px 2px at 70% 20%, rgba(255,255,255,.16), transparent 55%),
    radial-gradient(2px 2px at 40% 80%, rgba(255,255,255,.12), transparent 55%),
    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,.12), transparent 55%);
  background-size: 60px 60px, 60px 60px, auto, auto, auto, auto;
  opacity:.50;
  mask-image: radial-gradient(circle at 50% 40%, rgba(0,0,0,.95), transparent 72%);
  animation: gridDrift 18s linear infinite;
  z-index:-1;
  pointer-events:none;
}

@keyframes floatWave{
  0%{ transform: translateX(-40px) translateY(-25px) scale(1); }
  50%{ transform: translateX(45px) translateY(25px) scale(1.08); }
  100%{ transform: translateX(-15px) translateY(10px) scale(1.02); }
}

@keyframes gridDrift{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(18px); }
  100%{ transform: translateY(0px); }
}

.wrap{
  position:relative;
  width:min(92vw, 420px);
}

/* Glow exterior */
.glow{
  position:absolute; inset:-40px;
  background:
    radial-gradient(280px 180px at 25% 20%, rgba(34,211,238,.20), transparent 65%),
    radial-gradient(320px 200px at 75% 30%, rgba(168,85,247,.18), transparent 70%),
    radial-gradient(260px 200px at 50% 85%, rgba(236,72,153,.10), transparent 70%);
  filter: blur(18px);
  opacity:.9;
  pointer-events:none;
}

/* Card futurista */
.card{
  position:relative;
  background: var(--card);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius);
  padding: 34px 28px 26px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  overflow:hidden;
  transform: translateZ(0);
}

/* Borde neón sutil */
.card::before{
  content:"";
  position:absolute; inset:0;
  border-radius: inherit;
  padding:1px;
  background:
    linear-gradient(135deg, rgba(34,211,238,.55), rgba(168,85,247,.35), rgba(236,72,153,.20));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity:.45;
  pointer-events:none;
}

/* Scan line */
.card::after{
  content:"";
  position:absolute; left:-30%; top:-20%;
  width:160%; height:60px;
  background: linear-gradient(90deg, transparent, rgba(34,211,238,.12), transparent);
  transform: rotate(8deg);
  animation: scan 5.2s linear infinite;
  pointer-events:none;
}
@keyframes scan{
  0%{ transform: translateY(-140px) rotate(8deg); opacity:.0; }
  15%{ opacity:.65; }
  55%{ opacity:.35; }
  100%{ transform: translateY(520px) rotate(8deg); opacity:.0; }
}

.brand{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom: 18px;
}

.badge{
  width:38px; height:38px;
  border-radius: 14px;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 30% 30%, rgba(34,211,238,.22), transparent 60%),
    linear-gradient(135deg, rgba(34,211,238,.16), rgba(168,85,247,.12));
  border:1px solid rgba(34,211,238,.22);
  box-shadow: 0 0 22px rgba(34,211,238,.10);
}

.badge svg{
  width:20px; height:20px;
  fill:none;
  stroke: rgba(229,231,235,.9);
  stroke-width: 1.7;
}

h2{
  text-align:center;
  letter-spacing:.28em;
  text-transform:uppercase;
  font-weight: 800;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}

.sub{
  text-align:center;
  color: rgba(229,231,235,.78);
  font-size: 13px;
  margin-bottom: 22px;
}

.hr{
  height:1px;
  background: linear-gradient(90deg, transparent, rgba(34,211,238,.22), rgba(168,85,247,.18), transparent);
  margin: 14px 0 22px;
  opacity:.8;
}

.btn{
  width:100%;
  padding: 13px 14px;
  border-radius: 16px;
  border: 1px solid rgba(34,211,238,.18);
  background:
    linear-gradient(135deg, rgba(34,211,238,.18), rgba(168,85,247,.10)),
    radial-gradient(120px 50px at 30% 10%, rgba(34,211,238,.16), transparent 60%);
  color: white;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 12px;
  transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease, filter .12s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.btn:hover{
  border-color: rgba(34,211,238,.55);
  box-shadow: 0 14px 38px rgba(0,0,0,.35), 0 0 22px rgba(34,211,238,.10);
  filter: brightness(1.04);
  transform: translateY(-1px);
}

.btn:active{
  transform: translateY(0px) scale(.99);
}

.btn.secondary{
  background: rgba(2,6,23,.45);
  border: 1px solid rgba(255,255,255,.10);
}

.form{
  display:none;
  margin-top: 10px;
  text-align:left;
  animation: fadeUp .18s ease both;
}
@keyframes fadeUp{
  from{ opacity:0; transform: translateY(6px); }
  to{ opacity:1; transform: translateY(0); }
}

label{
  font-size: 11px;
  color: rgba(156,163,175,.95);
  margin-top: 10px;
  display:block;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.field{
  position:relative;
  margin-top:6px;
}

input{
  width:100%;
  padding: 12px 12px 12px 40px;
  border-radius: 14px;
  border: 1px solid rgba(34,211,238,.12);
  background: rgba(5, 11, 24, .78);
  color: white;
  outline:none;
  transition: border-color .12s ease, box-shadow .12s ease;
}

input::placeholder{ color: rgba(156,163,175,.55); }

input:focus{
  border-color: rgba(34,211,238,.55);
  box-shadow: 0 0 0 3px rgba(34,211,238,.10);
}

.icon{
  position:absolute;
  left:12px; top:50%;
  transform: translateY(-50%);
  width:18px; height:18px;
  opacity:.85;
  fill:none;
  stroke: rgba(229,231,235,.80);
  stroke-width: 1.7;
}

.submit{
  margin-top: 14px;
  background:
    linear-gradient(135deg, rgba(34,211,238,.95), rgba(168,85,247,.55));
  border: 1px solid rgba(34,211,238,.25);
  font-weight: 900;
}

.error{
  margin-top: 10px;
  color: var(--danger);
  font-size: 13px;
  text-align:center;
  min-height: 18px;
}

/* Responsive */
@media (max-width:420px){
  .card{ padding: 30px 22px 22px; }
}
</style>
</head>

<body>
  <div class="wrap">
    <div class="glow"></div>

    <div class="card">
      <div class="brand">
        <div class="badge" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 3v4M7 7l5-4 5 4M5 11l7 4 7-4M12 15v6M5 11v6l7 4 7-4v-6"/>
          </svg>
        </div>
      </div>

      <h2>Ingreso</h2>
      <div class="sub">Selecciona tu rol para continuar</div>

      <div class="hr"></div>

      <div id="roleSelector">
        <button class="btn" onclick="showAdmin()">Administrador</button>
        <button class="btn" onclick="showStudent()">Estudiante</button>
      </div>

      <div class="form" id="adminForm">
        <label>Contraseña</label>
        <div class="field">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 11V8a5 5 0 0 1 10 0v3"/>
            <path d="M6 11h12v10H6z"/>
          </svg>
          <input type="password" id="adminPassword" placeholder="Ingrese contraseña" />
        </div>

        <button class="btn submit" onclick="loginAdmin()">Entrar</button>
        <button class="btn secondary" onclick="goBack()">Volver</button>
        <div class="error" id="adminError"></div>
      </div>

      <div class="form" id="studentForm">
        <label>Nombre</label>
        <div class="field">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0"/>
            <path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4z"/>
          </svg>
          <input type="text" id="studentName" placeholder="Tu nombre" />
        </div>

        <label>ID Banner</label>
        <div class="field">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h10"/>
            <path d="M4 5h16v14H4z"/>
          </svg>
          <input type="text" id="studentBanner" placeholder="A00123456" />
        </div>

        <button class="btn submit" onclick="loginStudent()">Entrar</button>
        <button class="btn secondary" onclick="goBack()">Volver</button>
        <div class="error" id="studentError"></div>
      </div>

    </div>
  </div>

<script>
function showAdmin(){
  document.getElementById("roleSelector").style.display="none";
  document.getElementById("adminForm").style.display="block";
}

function showStudent(){
  document.getElementById("roleSelector").style.display="none";
  document.getElementById("studentForm").style.display="block";
}

function goBack(){
  document.getElementById("adminForm").style.display="none";
  document.getElementById("studentForm").style.display="none";
  document.getElementById("roleSelector").style.display="block";
  document.getElementById("adminError").textContent = "";
  document.getElementById("studentError").textContent = "";
}

/* ✅ NUEVO: leer next desde la URL del login */
function getNext(){
  const params = new URLSearchParams(window.location.search);
  return params.get("next") || "";
}

async function loginAdmin(){
  const password = document.getElementById("adminPassword").value.trim();
  const next = getNext();

  if(!password){
    document.getElementById("adminError").textContent="Ingresa la contraseña ❗";
    return;
  }

  const r = await fetch("/auth/admin",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ password, next })
  });

  const j = await r.json().catch(()=> ({}));

  if(!r.ok){
    document.getElementById("adminError").textContent = j.error || "Error";
  }else{
    window.location.href = j.redirect;
  }
}

async function loginStudent(){
  const name = document.getElementById("studentName").value.trim();
  const banner_id = document.getElementById("studentBanner").value.trim();
  const next = getNext() || "/registro-estudiante";

  if(!name || !banner_id){
    document.getElementById("studentError").textContent="Completa Nombre e ID Banner ❗";
    return;
  }

  const r = await fetch("/auth/student",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ name, banner_id, next })
  });

  const j = await r.json().catch(()=> ({}));

  if(!r.ok){
    document.getElementById("studentError").textContent = j.error || "Error";
  }else{
    window.location.href = j.redirect;
  }
}
</script>

</body>
</html>
