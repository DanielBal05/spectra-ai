<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spectra AI — Registro</title>

  <style>
    :root{
      --bg:#020617;
      --card:#0b1224cc;
      --stroke:#1f2a44;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --cyan:#22d3ee;
      --purple:#a855f7;
      --ok:#4ade80;
      --danger:#f97373;
      --chip:#111a33;
      --panel:#061021;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,Segoe UI,sans-serif;
      background: radial-gradient(circle at top, #0b1120 0, #020617 45%, #000 100%);
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }
    .top{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px; margin-bottom:18px;
    }
    .title{
      font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
    }
    .topRight{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
    .linkBtn{
      color:var(--cyan);text-decoration:none;font-weight:700;
      border:1px solid #1b2a3a; padding:10px 14px; border-radius:14px;
      background:#071026;
    }
    .pillTop{
      background: var(--panel);
      border:1px solid #1f2a44;
      padding:8px 12px;border-radius:999px;
      color:var(--muted);
      font-size:12px;
      display:none;
    }

    .grid{
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:18px;
      align-items:start;
    }
    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .card h3{
      font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
      margin-bottom:10px;
    }
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    select, input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid #22304b;
      background:#050b18;
      color:var(--text);
      outline:none;
    }
    select:focus, input:focus{border-color:rgba(34,211,238,.45)}
    .btn{
      width:100%;
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid #20314b;
      background: linear-gradient(90deg, rgba(34,211,238,.25), rgba(168,85,247,.15));
      color:var(--text);
      font-weight:800;
      cursor:pointer;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.35}

    .listHead{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
      gap:10px; flex-wrap:wrap;
    }
    .pill{
      background: var(--panel);
      border:1px solid #1f2a44;
      padding:8px 12px;border-radius:999px;
      color:var(--muted);
      font-size:12px;
    }
    .filters{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    }
    .filters select{
      width:auto; min-width:170px;
      padding:10px 10px;
      border-radius:12px;
      background:#050b18;
    }

    .item{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      padding:14px;
      border-radius:16px;
      border:1px solid #1f2a44;
      background:#060c1b;
      margin-bottom:12px;
    }
    .row1{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .chip{
      background:var(--chip);
      border:1px solid #22304b;
      color:var(--muted);
      padding:6px 10px;border-radius:999px;
      font-size:12px;
    }
    .name{font-size:16px;font-weight:900}
    .sub{color:var(--muted);font-size:12px;margin-top:6px}
    .actions{display:flex;flex-direction:column;gap:10px;justify-content:center}
    .btnSmall{
      padding:10px 12px;border-radius:14px;border:1px solid #1f2a44;
      background:#071026;color:var(--text);cursor:pointer;font-weight:800;
      min-width:150px;
    }
    .btnOk{background:rgba(74,222,128,.12); border-color:rgba(74,222,128,.28)}
    .btnCopy{background:rgba(34,211,238,.12); border-color:rgba(34,211,238,.28)}
    .btnSmall:disabled{opacity:.55;cursor:not-allowed}
    .statusPrestado{color:var(--cyan);font-weight:900}
    .statusDevuelto{color:var(--ok);font-weight:900}

    .toast{
      position:fixed; right:18px; bottom:18px;
      background:#071026;border:1px solid #1f2a44;
      padding:12px 14px;border-radius:14px;
      color:var(--text); display:none;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
      max-width:520px;
      line-height:1.35;
      white-space:pre-line;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="title">Registro de préstamos</div>
    <div class="topRight">
      <span class="pillTop" id="whoPill">Estudiante: — | Banner: —</span>
      <a class="linkBtn" href="/">← Volver a Spectra</a>
      <a class="linkBtn" href="/reminders">⏰ Recordatorios</a>
      <a class="linkBtn" href="/login">🔐 Cambiar usuario</a>
    </div>
  </div>

  <div class="grid">
    <!-- FORM -->
    <div class="card">
      <h3>Registrar préstamo</h3>

      <label>Nombre</label>
      <input id="nombre" type="text" placeholder="Ej: Juan Perez" autocomplete="name" />

      <label>Semestre</label>
      <select id="semestre">
        <option value="">Selecciona...</option>
        <option>1</option><option>2</option><option>3</option><option>4</option>
        <option>5</option><option>6</option><option>7</option><option>8</option>
      </select>

      <label>Equipo</label>
      <input id="equipo" type="text" placeholder="Ej: Osciloscopio" autocomplete="off" />

      <button class="btn" id="btnRegistrar">Registrar</button>

      <div class="hint">
        n8n asigna automáticamente <b>Fecha</b> e <b>ID</b>. <br/>
        Apenas se registre, verás el ID en la notificación.
      </div>
    </div>

    <!-- LISTA -->
    <div class="card">
      <div class="listHead">
        <h3 style="margin:0;">Lista de préstamos</h3>
        <div class="filters">
          <select id="filtroEstado">
            <option value="todos">Todos</option>
            <option value="prestado">Solo Prestados</option>
            <option value="devuelto">Solo Devueltos</option>
          </select>
          <button class="btnSmall btnCopy" id="btnRefresh" title="Actualizar lista">↻ Actualizar</button>
          <div class="pill" id="countPill">0 items</div>
        </div>
      </div>

      <div id="lista"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const $ = (id) => document.getElementById(id);

  // ✅ guardamos sesión aquí para usarlo al registrar
  let SESSION = { role: null, student_name: "", banner_id: "" };

  function toast(msg){
    const t = $("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(()=> t.style.display="none", 3200);
  }

  // ✅ cargar sesión (whoami) y autollenar nombre/banner
  async function preloadStudent(){
    try{
      const r = await fetch("/whoami", { cache:"no-store" });
      const j = await r.json().catch(()=> ({}));
      if(!r.ok || j.ok === false) return;

      SESSION.role = j.role || null;
      SESSION.student_name = j.student_name || "";
      SESSION.banner_id = j.banner_id || "";

      // Mostrar pill si es estudiante
      if (SESSION.role === "student"){
        const pill = $("whoPill");
        pill.textContent = `Estudiante: ${SESSION.student_name || "—"} | Banner: ${SESSION.banner_id || "—"}`;
        pill.style.display = "inline-flex";

        // Autollenar nombre si está vacío
        const nameInput = $("nombre");
        if(nameInput && !nameInput.value && SESSION.student_name){
          nameInput.value = SESSION.student_name;
        }
      } else if (SESSION.role === "admin"){
        const pill = $("whoPill");
        pill.textContent = `Admin activo ✅`;
        pill.style.display = "inline-flex";
      }
    }catch(e){
      // silencio
    }
  }

  // ✅ normaliza keys
  function kNorm(k){
    return (k ?? "")
      .toString()
      .trim()
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[\/]/g, "_")
      .replace(/\s+/g, "_");
  }

  function pick(obj, candidates){
    if(!obj || typeof obj !== "object") return "";
    for(const c of candidates){
      if(obj[c] !== undefined && obj[c] !== null) return obj[c];
    }
    const map = {};
    for(const key of Object.keys(obj)){
      map[kNorm(key)] = obj[key];
    }
    for(const c of candidates){
      const v = map[kNorm(c)];
      if(v !== undefined && v !== null) return v;
    }
    return "";
  }

  function normalizeItems(items){
    return (items || []).map(x => ({
      row_number: pick(x, ["row_number","rowNumber","#","Row"]),
      ID: (pick(x, ["ID","Id","id","codigo","code","lab_id","labId","LAB_ID"]) ?? "").toString(),
      Fecha: (pick(x, ["Fecha","fecha","created_at","createdAt","timestamp","time"]) ?? "").toString(),
      Nombre: (pick(x, ["Nombre","nombre","name","estudiante","alumno"]) ?? "").toString(),
      Semestre: (pick(x, ["Semestre","semestre","semester","nivel"]) ?? "").toString(),
      Equipo: (pick(x, ["Equipo","equipo","item","material","dispositivo"]) ?? "").toString(),
      BannerID: (pick(x, ["BannerID","banner_id","bannerid","id_banner","banner"]) ?? "").toString(), // ✅ opcional
      Estado: (pick(x, ["Prestado/ Devuelto","Prestado/Devuelto","prestado_devuelto","Estado","estado","status"]) ?? "").toString(),
    }));
  }

  function isBlankRow(it){
    const hasId = it.ID && it.ID.trim().length > 0;
    const hasName = it.Nombre && it.Nombre.trim().length > 0;
    const hasEq = it.Equipo && it.Equipo.trim().length > 0;
    return !(hasId || hasName || hasEq);
  }

  function stateKey(it){
    const e = (it.Estado || "").trim().toLowerCase();
    if (e.includes("prest")) return "prestado";
    if (e.includes("dev")) return "devuelto";
    return "otro";
  }

  function render(items){
    const list = $("lista");
    list.innerHTML = "";

    const filtro = $("filtroEstado").value;
    let filtered = items.filter(it => !isBlankRow(it));

    if (filtro !== "todos"){
      filtered = filtered.filter(it => stateKey(it) === filtro);
    }

    filtered.sort((a,b) => (b.Fecha || "").localeCompare(a.Fecha || ""));
    $("countPill").textContent = `${filtered.length} items`;

    for(const it of filtered){
      const st = stateKey(it);
      const isPrestado = st === "prestado";
      const statusClass = isPrestado ? "statusPrestado" : "statusDevuelto";
      const statusText = isPrestado ? "Prestado" : (st === "devuelto" ? "Devuelto" : it.Estado || "—");

      const div = document.createElement("div");
      div.className = "item";

      const bannerChip = it.BannerID ? `<span class="chip">Banner: ${it.BannerID}</span>` : "";

      div.innerHTML = `
        <div>
          <div class="row1">
            <div class="name">${it.Nombre || "(sin nombre)"}</div>
            <span class="chip">Semestre: ${it.Semestre || "-"}</span>
            <span class="chip">Equipo: ${it.Equipo || "-"}</span>
            ${bannerChip}
            <span class="chip">ID: ${it.ID || "-"}</span>
          </div>
          <div class="sub">
            <span>Fecha: ${it.Fecha || "-"}</span>
            &nbsp;•&nbsp;
            <span class="${statusClass}">${statusText}</span>
          </div>
        </div>
        <div class="actions">
          <button class="btnSmall btnCopy" data-copy="${it.ID || ""}" ${it.ID ? "" : "disabled"}>Copiar ID</button>
          ${
            isPrestado
              ? `<button class="btnSmall btnOk" data-dev="${it.ID || ""}" ${it.ID ? "" : "disabled"}>Devuelto</button>`
              : `<button class="btnSmall" disabled>✅ Devuelto</button>`
          }
        </div>
      `;
      list.appendChild(div);
    }

    list.querySelectorAll("button[data-copy]").forEach(btn=>{
      btn.addEventListener("click", async () => {
        const id = btn.getAttribute("data-copy") || "";
        if(!id) return toast("No hay ID ❌");
        try{
          await navigator.clipboard.writeText(id);
          toast(`ID copiado ✅\n${id}`);
        }catch(e){
          toast("No pude copiar (permiso del navegador) ❌");
        }
      });
    });

    list.querySelectorAll("button[data-dev]").forEach(btn=>{
      btn.addEventListener("click", async () => {
        const id = btn.getAttribute("data-dev") || "";
        if(!id) return toast("No hay ID para devolver ❌");

        const ok = confirm(`¿Marcar como DEVUELTO?\n\nID: ${id}`);
        if(!ok) return;

        btn.disabled = true;
        try{
          const r = await fetch("/api/lab/devolver", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ id })
          });
          const j = await r.json().catch(()=> ({}));
          if(!r.ok || j.ok === false){
            toast(j.error || j.msg || "Error devolviendo ❌");
          }else{
            toast(j.msg || "Devolución registrada ✅");
            await load();
          }
        }catch(e){
          toast("Error de red devolviendo ❌");
        }finally{
          btn.disabled = false;
        }
      });
    });
  }

  async function load(){
    try{
      const r = await fetch("/api/lab/listar", { cache:"no-store" });
      const j = await r.json().catch(()=> ({}));
      if(!r.ok){
        return toast(j.error || j.msg || `Error listando (${r.status}) ❌`);
      }

      let items = j.items ?? j.data ?? j.rows ?? j;
      if (typeof items === "string"){
        try { items = JSON.parse(items); } catch(e){ items = []; }
      }
      if (!Array.isArray(items)) items = [];

      const normalized = normalizeItems(items);
      render(normalized);
    }catch(e){
      toast("No se pudo cargar la lista ❌");
    }
  }

  $("btnRefresh").addEventListener("click", load);
  $("filtroEstado").addEventListener("change", load);

  $("btnRegistrar").addEventListener("click", async () => {
    const nombre = $("nombre").value.trim();
    const semestre = $("semestre").value.trim();
    const equipo = $("equipo").value.trim();
    if(!nombre || !semestre || !equipo){
      return toast("Completa Nombre, Semestre y Equipo ❗");
    }

    // ✅ si es estudiante, mandamos banner_id junto al préstamo
    const banner_id = (SESSION.role === "student") ? (SESSION.banner_id || "") : "";

    $("btnRegistrar").disabled = true;
    try{
      const r = await fetch("/api/lab/prestar", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ nombre, semestre, equipo, banner_id })
      });
      const j = await r.json().catch(()=> ({}));

      if(!r.ok || j.ok === false){
        toast(j.error || j.msg || "Error registrando ❌");
      } else {
        const id = j.id || j.ID || j.item?.ID || j.data?.ID;
        toast(id ? `Préstamo registrado ✅\nID: ${id}` : "Préstamo registrado ✅");
        await load();
      }
    }catch(e){
      toast("Error de red registrando ❌");
    }finally{
      $("btnRegistrar").disabled = false;
    }
  });

  ["nombre","equipo"].forEach(id=>{
    $(id).addEventListener("keydown", (e)=>{
      if(e.key === "Enter") $("btnRegistrar").click();
    });
  });

  // ✅ IMPORTANTE: primero preload (whoami) y luego carga lista
  (async ()=>{
    await preloadStudent();
    await load();
  })();
</script>
</body>
</html>
